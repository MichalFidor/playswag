version: 2

updates:
  # ── npm dependencies ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    groups:
      # Bump all non-breaking dev tooling together in a single PR
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
