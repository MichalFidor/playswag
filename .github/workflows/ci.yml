name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Integration tests
        run: npm run test:integration

      - name: E2E example tests
        run: npm run test:examples

  smoke-examples:
    name: Smoke — playswag-examples repo
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout playswag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: playswag

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: playswag/package-lock.json

      - name: Install + build playswag
        working-directory: playswag
        run: npm ci && npm run build

      - name: Pack playswag
        id: pack
        working-directory: playswag
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=$(pwd)/${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Checkout playswag-examples
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: MichalFidor/playswag-examples
          path: examples

      - name: Install examples dependencies
        working-directory: examples
        run: npm ci

      - name: Swap to local playswag build
        working-directory: examples
        run: npm install "${{ steps.pack.outputs.tarball }}"

      - name: Install Playwright browsers
        working-directory: examples
        run: npx playwright install --with-deps chromium

      - name: Run examples
        working-directory: examples
        run: npm run test:ci

      - name: Upload examples coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-examples-report
          path: examples/playswag-report/
          retention-days: 7
