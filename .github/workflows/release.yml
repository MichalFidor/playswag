name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Integration tests
        run: npm run test:integration

      - name: E2E example tests
        run: npm run test:examples

  smoke-examples:
    name: Smoke — playswag-examples repo
    runs-on: ubuntu-latest
    needs: [verify]

    steps:
      - name: Checkout playswag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: playswag

      - name: Set up Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: playswag/package-lock.json

      - name: Install + build playswag
        working-directory: playswag
        run: npm ci && npm run build

      - name: Pack playswag
        id: pack
        working-directory: playswag
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=$(pwd)/${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Checkout playswag-examples
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: MichalFidor/playswag-examples
          path: examples

      - name: Install examples dependencies
        working-directory: examples
        run: npm ci

      - name: Swap to local playswag build
        working-directory: examples
        run: npm install "${{ steps.pack.outputs.tarball }}"

      - name: Install Playwright browsers
        working-directory: examples
        run: npx playwright install --with-deps chromium

      - name: Run examples
        working-directory: examples
        run: npm run test:ci

      - name: Upload examples coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: smoke-examples-report
          path: examples/playswag-report/
          retention-days: 7

  publish:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    needs: [smoke-examples]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # e.g. 1.2.3
          MAJOR="${VERSION%%.*}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"     >> "$GITHUB_OUTPUT"

      - name: Verify package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.meta.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [VERSION]" up to (but not including) the next "## [" heading
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > /tmp/changelog.md
          # Fall back to git log if the section was empty
          if [ ! -s /tmp/changelog.md ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" HEAD > /tmp/changelog.md
            else
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" > /tmp/changelog.md
            fi
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

      - name: Set up Node 22 (GitHub Packages)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ steps.meta.outputs.major == '0' }}
