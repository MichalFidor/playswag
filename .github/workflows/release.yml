name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write
  id-token: write  # Required for OIDC Trusted Publisher

jobs:
  release:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                # e.g. 1.2.3
          MAJOR="${VERSION%%.*}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"     >> "$GITHUB_OUTPUT"

      - name: Verify package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.meta.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [VERSION]" up to (but not including) the next "## [" heading
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > /tmp/changelog.md
          # Fall back to git log if the section was empty
          if [ ! -s /tmp/changelog.md ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" HEAD > /tmp/changelog.md
            else
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" > /tmp/changelog.md
            fi
          fi

      - name: Publish to npm
        # OIDC Trusted Publisher — no token needed; npm CLI exchanges the GitHub
        # OIDC token automatically (requires Node ≥22.14 and npm CLI ≥11.5.1)
        run: npm publish --access public

      - name: Set up Node 22 (GitHub Packages)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ steps.meta.outputs.major == '0' }}
