openapi: '3.0.3'
info:
  title: Sample Test API
  version: '1.0.0'
servers:
  - url: http://localhost:3456

paths:
  /api/users:
    get:
      operationId: listUsers
      tags: [users]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of users
        '400':
          description: Bad request

    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
        '422':
          description: Unprocessable entity

  /api/users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
        '404':
          description: User not found

    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found

  /api/health:
    get:
      operationId: healthCheck
      responses:
        '200':
          description: Service healthy
